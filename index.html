<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QTS Resources Hub | Quantity Surveying Department</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a5f;
            --primary-light: #2c5282;
            --accent: #d4a843;
            --accent-hover: #c49a3a;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.4), 0 8px 10px -6px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: var(--transition);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }
        [data-theme="dark"] .navbar { background: rgba(15,23,42,0.9); }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--primary);
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.1rem;
        }
        .logo-text { font-weight: 700; font-size: 1.25rem; letter-spacing: -0.5px; }
        .logo-sub { font-size: 0.7rem; color: var(--text-light); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -4px; left: 0;
            width: 0; height: 2px; background: var(--accent); transition: var(--transition);
        }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }

        .nav-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .theme-toggle, .user-btn, .mobile-menu-btn {
            background: none;
            border: 2px solid var(--border);
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: var(--transition);
            font-size: 1rem;
        }
        .theme-toggle:hover, .user-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: rotate(20deg);
        }

        .user-btn { width: auto; padding: 0 1rem; border-radius: 50px; gap: 0.5rem; font-size: 0.85rem; font-weight: 600; }
        .user-btn:hover { transform: none; }
        .user-btn.logged-in { background: var(--primary); color: white; border-color: var(--primary); }
        .user-btn.logged-in:hover { background: var(--primary-light); }

        .mobile-menu-btn { display: none; }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 8rem 2rem 4rem;
            overflow: hidden;
        }
        .hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, var(--primary) 0%, #0f172a 100%); z-index: -2; }
        .hero-pattern {
            position: absolute; inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(212,168,67,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(44,82,130,0.2) 0%, transparent 50%);
            z-index: -1;
        }
        .hero-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }
        .hero-content { max-width: 900px; text-align: center; z-index: 1; }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: rgba(212,168,67,0.15);
            border: 1px solid rgba(212,168,67,0.3);
            color: var(--accent);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-size: 0.85rem; font-weight: 600;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease;
        }
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            color: white;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        .hero-title span { color: var(--accent); position: relative; }
        .hero-desc {
            font-size: 1.15rem;
            color: rgba(255,255,255,0.7);
            max-width: 600px;
            margin: 0 auto 2.5rem;
            animation: fadeInUp 0.8s ease 0.4s both;
        }
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease 0.6s both;
        }
        .stat-item { text-align: center; }
        .stat-number { font-size: 2rem; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .hero-cta {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.8s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: var(--accent); color: var(--primary); }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,168,67,0.3); }
        .btn-outline { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.3); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: white; transform: translateY(-2px); }
        .btn-sm { padding: 0.6rem 1.2rem; font-size: 0.85rem; }
        .btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg); color: var(--text); }

        .search-section {
            padding: 3rem 2rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .search-container { max-width: 700px; margin: 0 auto; position: relative; }
        .search-box {
            width: 100%;
            padding: 1.25rem 1.5rem 1.25rem 3.5rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .search-box:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(212,168,67,0.1); }
        .search-icon { position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 1.1rem; }
        .search-filters {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-light);
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .filter-chip:hover, .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .recent-section {
            padding: 4rem 2rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .recent-header-left { display: flex; align-items: center; gap: 1rem; }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16,185,129,0.1);
            color: var(--success);
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .recent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .recent-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }
        .recent-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--accent);
            transform: scaleY(0);
            transition: var(--transition);
        }
        .recent-card:hover { transform: translateX(5px); box-shadow: var(--shadow); border-color: var(--accent); }
        .recent-card:hover::before { transform: scaleY(1); }

        .recent-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, rgba(30,58,95,0.1), rgba(44,82,130,0.1));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--primary);
            flex-shrink: 0;
        }
        .recent-info { flex: 1; min-width: 0; }
        .recent-code { font-weight: 700; font-size: 0.85rem; color: var(--primary); margin-bottom: 0.2rem; }
        .recent-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recent-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-light);
        }
        .recent-meta span { display: flex; align-items: center; gap: 0.3rem; }
        .recent-meta .badge {
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-sem1 { background: rgba(59,130,246,0.15); color: var(--info); }
        .badge-sem2 { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-new {
            background: rgba(16,185,129,0.15);
            color: var(--success);
            animation: pulse 2s infinite;
        }
        .recent-action {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .recent-card:hover .recent-action { background: var(--accent); color: var(--primary); }

        .levels-section {
            padding: 5rem 2rem;
            max-width: 1280px;
            margin: 0 auto;
        }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-label {
            display: inline-block;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
        }
        .section-desc { color: var(--text-light); max-width: 500px; margin: 0 auto; }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .level-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }
        .level-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--accent); }

        .level-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            position: relative;
            overflow: hidden;
        }
        .level-header::after {
            content: '';
            position: absolute;
            top: -50%; right: -20%;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .level-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .level-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        .level-icon-header {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .level-title-header { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
        .level-subtitle-header { font-size: 0.85rem; opacity: 0.8; }

        .level-body { padding: 1.5rem; }

        .semester-block {
            margin-bottom: 1.5rem;
        }
        .semester-block:last-child { margin-bottom: 0; }

        .semester-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border);
        }
        .semester-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .semester-dot.sem1 { background: var(--info); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .semester-dot.sem2 { background: var(--warning); box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }

        .semester-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text);
        }
        .semester-count {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-light);
            background: var(--bg);
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
        }

        .course-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .course-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1rem;
            background: var(--bg);
            border-radius: 10px;
            transition: var(--transition);
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            border: 1px solid transparent;
        }
        .course-item:hover {
            background: var(--primary);
            color: white;
            transform: translateX(5px);
            border-color: var(--primary);
        }
        .course-item:hover .course-code { color: var(--accent); }
        .course-item:hover .course-icon { background: rgba(255,255,255,0.15); }

        .course-icon {
            width: 36px; height: 36px;
            background: rgba(30,58,95,0.08);

            font-size: 0.85rem;
            flex-shrink: 0;
            transition: var(--transition);
        }

        function generateRecentlyAdded() {
            const grid = document.getElementById('recentGrid');
            let allCourses = [];
            Object.keys(courseData).forEach(level => {
                const data = courseData[level];
                ['first', 'second'].forEach(sem => {
                    data.courses[sem].forEach(course => {
                        allCourses.push({
                            ...course,
                            level: level,
                            levelTitle: data.title,
                            semester: sem === 'first' ? '1st' : '2nd',
                            semesterFull: sem === 'first' ? '1st Semester' : '2nd Semester'
                        });
                    });
                });
            });
            allCourses.sort((a, b) => new Date(b.date) - new Date(a.date));
            const recent = allCourses.slice(0, 8);
            grid.innerHTML = recent.map((course, index) => {
                const isNew = index < 3;
                const daysAgo = Math.floor((new Date() - new Date(course.date)) / (1000 * 60 * 60 * 24));
                const timeText = daysAgo === 0 ? 'Today' : daysAgo === 1 ? 'Yesterday' : daysAgo + ' days ago';
                return `
                    <a href="files/${course.level}L/${course.file}" class="recent-card" download onclick="showToast('Downloading ${course.code}...')">
                        <div class="recent-icon"><i class="fas fa-file-pdf"></i></div>
                        <div class="recent-info">
                            <div class="recent-code">${course.code}</div>
                            <div class="recent-name">${course.name}</div>
                            <div class="recent-meta">
                                <span><i class="fas fa-layer-group"></i> ${course.levelTitle}</span>
                                <span class="badge ${course.semester === '1st' ? 'badge-sem1' : 'badge-sem2'}">${course.semesterFull}</span>
                                ${isNew ? '<span class="badge badge-new">NEW</span>' : ''}
                                <span><i class="fas fa-clock"></i> ${timeText}</span>
                            </div>
                        </div>
                        <div class="recent-action"><i class="fas fa-download"></i></div>
                    </a>
                `;
            }).join('');
        }

        function generateLevelCards() {
            const grid = document.getElementById('levelsGrid');
            grid.innerHTML = '';
            Object.keys(courseData).forEach(level => {
                const data = courseData[level];
                const card = document.createElement('div');
                card.className = 'level-card reveal';
                card.dataset.level = level;
                const firstCount = data.courses.first.length;
                const secondCount = data.courses.second.length;
                card.innerHTML = `
                    <div class="level-header">
                        <div class="level-header-top">
                            <span class="level-badge">${firstCount + secondCount} Courses</span>
                            <div class="level-icon-header"><i class="fas ${data.icon}"></i></div>
                        </div>
                        <div class="level-title-header">${data.title}</div>
                        <div class="level-subtitle-header">${data.subtitle}</div>
                    </div>
                    <div class="level-body">
                        <div class="semester-block">
                            <div class="semester-header">
                                <div class="semester-dot sem1"></div>
                                <span class="semester-title">1st Semester</span>
                                <span class="semester-count">${firstCount} courses</span>
                            </div>
                            <div class="course-list">
                                ${generateCourseList(data.courses.first, level, '1st')}
                            </div>
                        </div>
                        <div class="semester-block">
                            <div class="semester-header">
                                <div class="semester-dot sem2"></div>
                                <span class="semester-title">2nd Semester</span>
                                <span class="semester-count">${secondCount} courses</span>
                            </div>
                            <div class="course-list">
                                ${generateCourseList(data.courses.second, level, '2nd')}
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function generateCourseList(courses, level, semester) {
            return courses.map(course => `

                } else {
